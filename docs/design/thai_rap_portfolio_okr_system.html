<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>THAI-RAP Portfolio & OKR System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────── */
    :root {
      /* Warm neutrals — earth, not slate */
      --bg:    #f4f1ed;
      --card:  #ffffff;
      --ink:   #1c1917;
      --muted: #8a7d74;
      --line:  #e8e2db;
      --soft:  #f9f7f5;

      /* Terracotta accent — confident, food-adjacent */
      --accent:        #c2410c;
      --accent-light:  #fff7ed;
      --accent-border: #fecda9;
      --accent-hover:  #b33a0a;

      /* Sidebar — warm espresso, not cold black */
      --aside: #201c19;

      /* Status */
      --good: #16a34a;
      --warn: #d97706;
      --bad:  #dc2626;
      --blue: #2563eb;
    }

    /* ── Reset & base ──────────────────────────────── */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Noto Sans Thai', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14.5px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ─────────────────────────────────── */
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* ── Sidebar ───────────────────────────────────── */
    aside {
      background: var(--aside);
      padding: 18px 14px 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .brand small {
      color: rgba(255,255,255,.38);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .brand h1 {
      font-size: 15.5px;
      line-height: 1.4;
      margin: 7px 0 10px;
      color: #fff;
      font-weight: 800;
    }

    .brand .pill {
      display: inline-block;
      background: rgba(194,65,12,.28);
      border: 1px solid rgba(253,186,116,.22);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 11.5px;
      color: #fdba74;
      font-weight: 600;
    }

    nav button {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 9px 13px;
      border-radius: 9px;
      margin: 1px 0;
      font-weight: 600;
      font-size: 13.5px;
      font-family: inherit;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      transition: background .12s, color .12s;
    }

    nav button.active  { background: var(--accent); color: #fff; }
    nav button:hover:not(.active) { background: rgba(255,255,255,.07); color: rgba(255,255,255,.85); }

    .aside-hint {
      font-size: 11.5px;
      color: rgba(255,255,255,.27);
      line-height: 1.65;
      padding: 0 4px;
      margin-top: 18px;
    }

    /* ── Top header ────────────────────────────────── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 13px 24px;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    header h2 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -.02em; }
    .sub  { color: var(--muted); font-size: 12px; }

    /* ── Main content ──────────────────────────────── */
    main { padding: 24px; max-width: 1680px; width: 100%; }

    /* ── Section title ─────────────────────────────── */
    .section-title {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 22px;
    }

    .section-title .icon {
      width: 40px; height: 40px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .section-title h3 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
    .section-title p  { margin: 2px 0 0; color: var(--muted); font-size: 12.5px; }

    /* ── Grid helpers ──────────────────────────────── */
    .grid { display: grid; gap: 16px; }
    .g5   { grid-template-columns: repeat(5, minmax(0,1fr)); }
    .g4   { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .g3   { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .g2   { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .cols { grid-template-columns: 310px 1fr; }

    /* ── Card ──────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(28,25,23,.05), 0 1px 1px rgba(28,25,23,.03);
    }

    /* ── Stats ─────────────────────────────────────── */
    .stat small { color: var(--muted); font-size: 12px; font-weight: 500; }
    .stat b     { display: block; font-size: 28px; font-weight: 800; margin-top: 3px; letter-spacing: -.03em; line-height: 1.1; }
    .stat span  { display: block; font-size: 11.5px; color: var(--muted); margin-top: 3px; }

    /* ── Form elements ─────────────────────────────── */
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--soft);
      color: var(--ink);
      font: inherit;
      font-size: 13.5px;
      outline: none;
      transition: border-color .15s, background .15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(194,65,12,.08);
    }

    textarea { min-height: 80px; resize: vertical; }

    label { display: block; font-size: 12.5px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    label > input, label > select, label > textarea { margin-top: 4px; }

    .row   { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .space { height: 14px; }

    /* ── Buttons ───────────────────────────────────── */
    .btn {
      border: 1px solid var(--line);
      background: white;
      border-radius: 10px;
      padding: 9px 15px;
      font-weight: 700;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--ink);
      cursor: pointer;
      transition: background .12s;
    }

    .btn:hover          { background: var(--soft); }
    .btn.dark           { background: var(--ink); color: #fff; border-color: var(--ink); }
    .btn.dark:hover     { background: #332e2b; }
    .btn.bad            { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .btn.bad:hover      { background: #fee2e2; }
    .btn.good           { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .btn.blue           { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

    /* ── Tables ────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: var(--soft); color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    tr:hover td { background: #faf8f6; }

    /* ── Progress bars ─────────────────────────────── */
    .bar        { height: 7px; background: var(--line); border-radius: 999px; overflow: hidden; }
    .bar > div  { height: 100%; background: var(--accent); border-radius: 999px; }

    .barline         { margin: 8px 0 13px; }
    .barline .label  { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 5px; }

    /* ── Badges ────────────────────────────────────── */
    .badge  { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; font-size: 12px; font-weight: 700; }
    .red    { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .orange { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .yellow { background: #fefce8; color: #a16207; border-color: #fde68a; }
    .blue   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .green  { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .gray   { background: var(--soft); color: #57534e; border-color: var(--line); }

    /* ── Question cards ────────────────────────────── */
    .question       { border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: var(--soft); }
    .question-title { font-weight: 700; margin-bottom: 9px; font-size: 14px; }

    /* ── Evidence image upload ──────────────────────── */
    .img-upload {
      border: 1.5px dashed var(--line);
      border-radius: 10px;
      background: var(--card);
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color .15s, background .15s;
    }
    .img-upload:hover                { border-color: var(--accent); background: var(--accent-light); }
    .img-upload.filled               { border-style: solid; border-color: var(--line); padding: 6px; }
    .img-upload img                  { max-width: 100%; max-height: 90px; border-radius: 7px; object-fit: cover; display: block; }
    .img-upload .ev-label            { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; padding: 10px; pointer-events: none; }
    .img-upload .ev-label span       { font-size: 18px; display: block; margin-bottom: 2px; }
    .img-upload .ev-remove           { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 999px; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

    /* ── Round-selector pills (SVG rings, timeline) ─ */
    .round-pills            { display: flex; align-items: flex-start; justify-content: space-between; position: relative; padding: 4px 0 0; }
    .round-pills::before    { content:''; position:absolute; top:39px; left:calc(10% + 2px); right:calc(10% + 2px); height:1.5px; background:var(--line); z-index:0; }
    .round-pill             { display:flex; flex-direction:column; align-items:center; gap:7px; flex:1; background:none; border:none; cursor:pointer; padding:0 4px; font-family:inherit; position:relative; z-index:1; transition:transform .18s; }
    .round-pill:hover       { transform:translateY(-3px); }
    .rp-active              { transform:translateY(-3px); }
    .round-ring-wrap        { position:relative; width:70px; height:70px; filter:drop-shadow(0 1px 3px rgba(28,25,23,.07)); }
    .rp-active .round-ring-wrap { filter:drop-shadow(0 4px 12px rgba(28,25,23,.14)); }
    .round-ring-svg         { width:70px; height:70px; display:block; }
    .round-ring-text        { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
    .rr-code                { font-size:9.5px; font-weight:700; letter-spacing:.07em; color:var(--muted); line-height:1; text-transform:uppercase; }
    .rr-num                 { font-size:19px; font-weight:900; line-height:1; letter-spacing:-.04em; }
    .rr-label               { font-size:10.5px; font-weight:500; color:var(--muted); text-align:center; line-height:1; }
    .rp-active .rr-label    { color:var(--accent); font-weight:700; }

    /* ── Dimension tabs ────────────────────────────── */
    .dim-tabs         { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .dim-tabs button  { padding: 7px 11px; border-radius: 8px; border: 1px solid var(--line); background: white; cursor: pointer; font-weight: 700; font-size: 12.5px; font-family: inherit; color: var(--ink); }
    .dim-tabs button.active { background: var(--ink); color: white; border-color: var(--ink); }

    /* ── Alert ─────────────────────────────────────── */
    .alert { border-radius: 12px; padding: 13px; background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; margin-bottom: 10px; font-size: 13.5px; }

    /* ── Score buttons (0–4) ──────────────────────── */
    .score-btns { display:flex; gap:5px; margin-top:7px; max-width:310px; }
    .sb {
      flex:1; border:1.5px solid var(--line); background:#fff;
      border-radius:10px; padding:10px 2px 8px; cursor:pointer;
      font-family:inherit; text-align:center; color:var(--muted);
      transition:all .13s; min-width:0;
    }
    .sb:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); transform:translateY(-1px); box-shadow:0 2px 8px rgba(194,65,12,.10); }
    .sb-n { font-size:19px; font-weight:900; display:block; line-height:1; }
    .sb-l { font-size:9.5px; display:block; margin-top:3px; line-height:1; opacity:.75; }
    .sb-on-0 { background:#fef2f2!important; border-color:#dc2626!important; color:#dc2626!important; box-shadow:0 2px 8px rgba(220,38,38,.13)!important; }
    .sb-on-1 { background:#fff7ed!important; border-color:#ea580c!important; color:#ea580c!important; box-shadow:0 2px 8px rgba(234,88,12,.13)!important; }
    .sb-on-2 { background:#fefce8!important; border-color:#ca8a04!important; color:#ca8a04!important; box-shadow:0 2px 8px rgba(202,138,4,.13)!important; }
    .sb-on-3 { background:#eff6ff!important; border-color:#2563eb!important; color:#2563eb!important; box-shadow:0 2px 8px rgba(37,99,235,.13)!important; }
    .sb-on-4 { background:#f0fdf4!important; border-color:#16a34a!important; color:#16a34a!important; box-shadow:0 2px 8px rgba(22,163,74,.13)!important; }

    /* ── Question card v2 ──────────────────────────── */
    .q-header  { display:flex; gap:10px; align-items:flex-start; margin-bottom:10px; }
    .q-num     { background:var(--accent-light); color:var(--accent); border:1px solid var(--accent-border); border-radius:7px; font-size:11px; font-weight:800; padding:3px 8px; white-space:nowrap; flex-shrink:0; line-height:1.5; letter-spacing:.01em; }
    .q-text    { margin:0; font-size:14px; font-weight:600; line-height:1.55; color:var(--ink); }
    .q-score-lbl { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
    .q-bottom  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    @media(max-width:640px){ .q-bottom { grid-template-columns:1fr; } }

    /* ── Question inline row (score + evidence side-by-side) */
    .q-main-row  { display:flex; gap:10px; align-items:flex-start; margin-top:8px; }
    .q-score-col { flex:1; min-width:0; }
    .q-ev-col    { flex:0 0 120px; }
    /* Locked round */
    .q-locked .sb            { opacity:.4!important; pointer-events:none!important; cursor:not-allowed!important; box-shadow:none!important; transform:none!important; }
    .q-locked .img-upload    { opacity:.45; pointer-events:none; }
    .q-locked .ev-remove     { display:none; }
    .q-locked input:not([type=file]),
    .q-locked textarea       { opacity:.55; pointer-events:none; background:var(--soft)!important; }
    /* Highlight unfilled on submit */
    @keyframes qpulse { 0%,100%{outline-color:var(--accent)} 50%{outline-color:transparent} }
    .q-highlight { outline:2.5px solid var(--accent)!important; background:var(--accent-light)!important; }
    .q-pulse     { animation:qpulse .45s ease-in-out 5; }

    /* ── Store autocomplete ────────────────────────── */
    .ac-wrap  { position:relative; flex:1; min-width:180px; }
    .ac-input { width:100%; padding:10px 13px; border:1px solid var(--line); border-radius:10px; background:var(--soft); color:var(--ink); font:inherit; font-size:13.5px; outline:none; transition:border-color .15s,background .15s; cursor:text; }
    .ac-input:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(194,65,12,.08); }
    .ac-drop  { position:absolute; top:calc(100% + 6px); left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 8px 28px rgba(28,25,23,.13),0 2px 6px rgba(28,25,23,.06); z-index:200; max-height:240px; overflow-y:auto; padding:5px; }
    .ac-item  { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:9px 11px; border-radius:8px; cursor:pointer; transition:background .1s; }
    .ac-item:hover,.ac-item.ac-sel { background:var(--accent-light); }
    .ac-item.ac-sel .ac-name { color:var(--accent); }
    .ac-name  { font-size:13.5px; font-weight:600; color:var(--ink); }
    .ac-meta  { font-size:11.5px; color:var(--muted); font-weight:500; white-space:nowrap; }
    .ac-empty { padding:14px 13px; color:var(--muted); font-size:13px; text-align:center; }

    /* ── OKR / Portfolio ───────────────────────────── */
    .okr-card       { border: 1px solid var(--line); border-radius: 14px; padding: 20px; background: var(--card); margin-bottom: 14px; }
    .kr-row         { border-top: 1px solid var(--line); padding: 14px 0; }
    .portfolio-block{ border: 1px solid var(--line); border-radius: 14px; padding: 18px; background: var(--card); margin-bottom: 14px; }
    .print-report   { white-space: pre-wrap; background: white; border: 1px solid var(--line); border-radius: 14px; padding: 18px; line-height: 1.7; font-size: 13px; }

    /* ── Mobile ────────────────────────────────────── */
    .mobile-nav { display: none; }

    @media (max-width: 1100px) {
      .app                            { grid-template-columns: 1fr; }
      aside                           { display: none; }
      .mobile-nav                     { display: flex; gap: 8px; overflow: auto; margin-top: 10px; }
      .mobile-nav button              { white-space: nowrap; }
      .g5,.g4,.g3,.g2,.cols          { grid-template-columns: 1fr; }
      main                            { padding: 14px; }
      header                          { position: relative; }
    }

    @media print {
      aside, header, .no-print        { display: none !important; }
      .app                            { display: block; }
      main                            { padding: 0; }
      .card                           { box-shadow: none; border: 0; }
      .print-report                   { border: 0; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <small>THAI-RAP 2026</small>
      <h1>Portfolio & OKR Diagnostic System</h1>
      <span class="pill">ทำร้านให้รอด → ทำร้านให้โต</span>
    </div>
    <nav id="nav"></nav>
    <div class="aside-hint">
      บันทึกในเครื่องอัตโนมัติ<br>

  <div>
    <header>
      <h2>THAI-RAP Portfolio & OKR System</h2>
      <div class="sub">ระบบเช็คร้าน · Digital Portfolio · OKR Dashboard</div>
      <div class="mobile-nav" id="mobileNav"></div>
    </header>
    <main id="main"></main>
  </div>
</div>

<script>

const provinces = ["จันทบุรี","ระยอง","ชลบุรี","ตราด","ปราจีนบุรี","สระแก้ว","ฉะเชิงเทรา","นครนายก"];

  {id:3,name:"แบรนด์และโมเดลธุรกิจ",short:"แบรนด์",weight:.10,count:6,portfolio:"Brand Story, CI, Key Visual, BMC, Positioning, ภาพจำร้าน"},
  {id:4,name:"การตลาดและฐานลูกค้า",short:"การตลาด",weight:.13,count:7,portfolio:"ช่องทางออนไลน์, แผนคอนเทนต์, Customer Persona, CRM, หลักฐานลูกค้าซื้อซ้ำ"},

function hasAnyScore(storeId, roundCode) {
  return questions.some(q => {
    const v = data.scores?.[storeId]?.[roundCode]?.[q.id]?.score;
    return v !== "" && v !== null && v !== undefined;
  });
}
function roundPills(storeId, activeRound) {
  const zc    = {red:'#dc2626',orange:'#ea580c',yellow:'#d97706',blue:'#2563eb',green:'#16a34a'};
  const short = {T0:'ก่อนค่าย',T1:'หลังค่าย',T2:'ลงพื้นที่',T3:'1 เดือน',T4:'3 เดือน'};
  const R = 15.9, C = +(2 * Math.PI * R).toFixed(2); // circumference ≈ 99.9
  return '<div class="round-pills">' + rounds.map(r => {
    const has  = hasAnyScore(storeId, r.code);
    const sc   = has ? +totalScore(storeId, r.code).toFixed(1) : 0;
    const z    = has ? zone(sc) : null;
    const col  = z ? zc[z[2]] : '#d0c9c2';
    const dash = has ? +(sc / 100 * C).toFixed(2) : 0;
    const gap  = +(C - dash).toFixed(2);
    const act  = r.code === activeRound;
    const bgFill = act ? (z ? zc[z[2]] + '14' : '#fef0e7') : '#ffffff';
    const svg  = '<svg class="round-ring-svg" viewBox="0 0 36 36">'
      // white/tinted background disc
      + '<circle cx="18" cy="18" r="17.5" fill="' + bgFill + '"/>'
      // track ring
      + '<circle cx="18" cy="18" r="' + R + '" fill="none" stroke="#e9e3dc" stroke-width="2.6"/>'
      // progress arc
      + (dash > 0
          ? '<circle cx="18" cy="18" r="' + R + '" fill="none"'
            + ' stroke="' + col + '" stroke-width="2.6"'
            + ' stroke-dasharray="' + dash + ' ' + gap + '"'
            + ' stroke-linecap="round"'
            + ' transform="rotate(-90 18 18)"/>'
          : '')
      + '</svg>';
    return '<button class="round-pill' + (act ? ' rp-active' : '') + '"'
      + ' onclick="setRound(\'' + r.code + '\')" title="' + r.name + '">'
      + '<div class="round-ring-wrap">'
      +   svg
      +   '<div class="round-ring-text">'
      +     '<span class="rr-code">' + r.code + '</span>'
      +     '<span class="rr-num" style="color:' + (has ? col : '#c8bfb7') + '">'
      +       (has ? sc.toFixed(0) : '—')
      +     '</span>'
      +   '</div>'
      + '</div>'
      + '<small class="rr-label">' + short[r.code] + (data.submittedRounds?.[storeId]?.[r.code] ? ' 🔒' : '') + '</small>'
      + '</button>';
  }).join('') + '</div>';
}

  <div class="grid cols"><div class="card"><h3>${esc(s.name)}</h3>${bar("Portfolio Completion",portfolioCompletion(s.id).percent)}<p class="sub">ครบ ${portfolioCompletion(s.id).done}/8 มิติ</p><div class="dim-tabs">${dimensions.map(x=>`<button class="${x.id===selectedPortfolioDim?"active":""}" onclick="setPortfolioDim(${x.id})">${x.id}. ${esc(x.short)} ${data.portfolio[s.id][x.id]?.complete?"✓":""}</button>`).join("")}</div></div>
  <div class="card"><h3>${d.id}. ${esc(d.name)}</h3><p class="sub"><b>หลักฐานที่ควรมี:</b> ${esc(d.portfolio)}</p>
    <label class="row" style="margin:10px 0"><input style="width:auto" type="checkbox" ${p.complete?"checked":""} onchange="data.portfolio['${s.id}'][${d.id}].complete=this.checked;save();render()"> มิตินี้สมบูรณ์แล้ว</label>
    <label>สรุปผลงาน/สิ่งที่พัฒนา<textarea onchange="data.portfolio['${s.id}'][${d.id}].summary=this.value;save()">${esc(p.summary||"")}</textarea></label>
    <label>หลักฐาน/ผลลัพธ์สำคัญ<textarea onchange="data.portfolio['${s.id}'][${d.id}].evidence=this.value;save()">${esc(p.evidence||"")}</textarea></label>
    <label>ลิงก์ไฟล์/รูปภาพ/เอกสาร<textarea onchange="data.portfolio['${s.id}'][${d.id}].fileLinks=this.value;save()">${esc(p.fileLinks||"")}</textarea></label>
    <label>หมายเหตุ Mentor<textarea onchange="data.portfolio['${s.id}'][${d.id}].mentorNote=this.value;save()">${esc(p.mentorNote||"")}</textarea></label>
  </div></div>`;
}
function portfolioText(storeId){
  const s=data.stores.find(x=>x.id===storeId); let out=`Digital Portfolio 8 มิติ\nร้าน: ${s.name}\nจังหวัด: ${s.province}\nสถานะ: ${s.status}\nครบ: ${portfolioCompletion(storeId).done}/8 มิติ\n\n`;
  dimensions.forEach(d=>{const p=data.portfolio?.[storeId]?.[d.id]||{};out+=`${d.id}. ${d.name}\nสถานะ: ${p.complete?"สมบูรณ์":"ยังไม่สมบูรณ์"}\nหลักฐานที่ควรมี: ${d.portfolio}\nสรุปผลงาน: ${p.summary||"-"}\nหลักฐาน/ผลลัพธ์: ${p.evidence||"-"}\nลิงก์ไฟล์: ${p.fileLinks||"-"}\nหมายเหตุ Mentor: ${p.mentorNote||"-"}\n\n`});
  return out;
}
function pitchingPage(){
  const s=data.stores.find(x=>x.id===selectedStoreId)||data.stores[0]; if(!s)return `<div class="card">ยังไม่มีร้าน</div>`; selectedStoreId=s.id;
  const p=data.pitching[s.id]||{}; const fields=[["business","ความชัดเจนของปัญหาและโอกาสทางธุรกิจ"],["product","ความน่าสนใจของเมนู / สินค้า"],["market","ความเป็นไปได้ของแผนตลาด"],["financial","ความเข้าใจต้นทุนและกำไร"],["readiness","ความพร้อมของเจ้าของร้าน"]];
  return `${title("Pitching Score","คะแนน Pitching รวม 100 คะแนน เพื่อใช้คัดเลือก 50 ร้านเหลือ 20 ร้าน")}
  <div class="grid cols"><div class="card"><label>เลือกร้าน</label>${storeAcHtml(s.id)}<div class="space"></div>${stat("คะแนน Pitching รวม",pitchTotal(s.id),"จาก 100 คะแนน")}</div>
  <div class="card">${fields.map(([k,l])=>`<div class="question"><b>${esc(l)}</b><div class="sub">เต็ม 20</div><input type="number" min="0" max="20" value="${esc(p[k])}" onchange="data.pitching['${s.id}']['${k}']=Math.max(0,Math.min(20,Number(this.value)||0));save();render()"></div>`).join("")}<textarea placeholder="ข้อเสนอแนะจากกรรมการ" onchange="data.pitching['${s.id}'].note=this.value;save()">${esc(p.note||"")}</textarea></div></div>`;
}
function rankingPage(){
  return `${title("Ranking คัดเลือก 20 ร้าน","สูตร: T1 40% + พัฒนาการ 25% + Pitching 20% + Mindset 10% + Evidence 5%")}
  <div class="row no-print"><button class="btn dark" onclick="exportRanking()">Export Ranking CSV</button><button class="btn" onclick="exportScores()">Export คะแนนทั้งหมด</button><button class="btn" onclick="exportPortfolio()">Export Portfolio</button></div><div class="space"></div>
  <div class="card"><table><thead><tr><th>อันดับ</th><th>ร้าน</th><th>T1</th><th>พัฒนา</th><th>Pitch</th><th>Readiness</th><th>Portfolio</th><th>Red Flag</th><th>สถานะ</th></tr></thead><tbody>
  ${ranking().map((r,i)=>`<tr><td><b>${i+1}</b></td><td><button class="btn" onclick="selectedStoreId='${r.store.id}';go('report')">${esc(r.store.name)}</button><div class="sub">${esc(r.store.province)} • ${esc(r.store.owner||"-")}</div></td><td>${r.calc.t1.toFixed(1)}</td><td>${r.calc.improvement.toFixed(1)}</td><td>${r.calc.pitch.toFixed(1)}</td><td><b>${r.calc.score.toFixed(1)}</b></td><td>${portfolioCompletion(r.store.id).done}/8</td><td><span class="badge ${r.flags.length?"red":"green"}">${r.flags.length}</span></td><td><span class="badge gray">${esc(r.status)}</span></td></tr>`).join("")}
  </tbody></table></div>`;
}
function okrPage(){
  const all=okrs.flatMap(o=>o.krs); const done=all.filter(kr=>krProgress(kr).done).length;
  const avgP=all.reduce((s,kr)=>s+krProgress(kr).percent,0)/(all.length||1);
  return `${title("OKR / KR Dashboard","ติดตามหมวด Growth & Revenue, Food Innovation, Market & Customer, Digital Governance")}
  <div class="grid g4">${stat("KR ทั้งหมด",all.length,"")}${stat("KR สำเร็จ",done,"ถึงเป้าหมาย")}${stat("Progress เฉลี่ย",avgP.toFixed(1)+"%","จาก KR ทั้งหมด")}${stat("อัปเดตล่าสุด",new Date(data.updatedAt||Date.now()).toLocaleDateString("th-TH"),"")}</div>
  <div class="space"></div><div class="row no-print"><button class="btn dark" onclick="recomputeOKR()">คำนวณ OKR จากข้อมูลระบบ</button><button class="btn" onclick="exportOKR()">Export OKR CSV</button></div><div class="space"></div>
  ${okrs.map(o=>`<div class="okr-card"><div class="sub">${esc(o.cat)}</div><h3>${esc(o.oid)}: ${esc(o.objective)}</h3>${o.krs.map(kr=>{const p=krProgress(kr), rec=data.okrProgress[kr.id]||{};return `<div class="kr-row"><div class="row" style="justify-content:space-between"><b>${esc(kr.id)}</b><span class="badge ${p.done?"green":"yellow"}">${p.done?"Done":"In progress"} ${p.percent.toFixed(1)}%</span></div><p>${esc(kr.text)}</p><div class="grid g4"><label>เจ้าภาพ<input value="${esc(kr.owner||"-")}" disabled></label><label>Target<input value="${esc(kr.target+' '+kr.unit)}" disabled></label><label>Actual<input type="number" value="${esc(rec.actual??"")}" onchange="data.okrProgress['${kr.id}'].actual=Number(this.value)||0;data.okrProgress['${kr.id}'].updated=new Date().toLocaleDateString('th-TH');save();render()"></label><label>หมายเหตุ<input value="${esc(rec.note||"")}" onchange="data.okrProgress['${kr.id}'].note=this.value;save()"></label></div>${bar("Progress",p.percent)}</div>`}).join("")}</div>`).join("")}`;
}
function recommend(dimId,score){const m={1:"ทำสูตรมาตรฐาน เมนู Signature และระบบรับ Feedback ลูกค้า",2:"จัดโซนครัว ตรวจวันหมดอายุ และทำ Food Safety Action Plan",3:"กำหนดลูกค้าเป้าหมาย จุดขาย เรื่องเล่า และ Business Model ให้ชัด",4:"ปรับ Google Maps/ช่องทางออนไลน์ ทำคอนเทนต์ และวัดช่องทางยอดขาย",5:"ทำ Costing Sheet แยกเงินร้าน บันทึกรายรับรายจ่าย และดู Cash Flow",6:"ทำ SOP เปิด-ปิดร้าน แบ่งหน้าที่ สต็อก และมาตรฐานบริการ",7:"สร้างซัพพลายเออร์สำรอง เชื่อมวัตถุดิบท้องถิ่นและเครือข่ายชุมชน",8:"กำหนดเป้าหมาย 3–6 เดือน เตรียมหลักฐาน และเปิดรับการลงพื้นที่"};return score>=75?"รักษามาตรฐานและต่อยอดเป็นจุดแข็งของร้าน":m[dimId]}
function reportText(storeId){
  const s=data.stores.find(x=>x.id===storeId); const t0=totalScore(s.id,"T0"),t1=totalScore(s.id,"T1"),r=readiness(s.id),z=zone(t1),flags=redFlags(s.id,"T1");
  const dims=dimensions.map(d=>({...d,t0:dimScore(s.id,"T0",d.id),t1:dimScore(s.id,"T1",d.id)})); const strong=[...dims].sort((a,b)=>b.t1-a.t1).slice(0,3); const weak=[...dims].sort((a,b)=>a.t1-b.t1).slice(0,3); const pc=portfolioCompletion(s.id);
  return `Restaurant Survival + Digital Portfolio Report
ร้าน: ${s.name}
จังหวัด: ${s.province}
สถานะ: ${s.status}
เจ้าของร้าน: ${s.owner||"-"}
คะแนน T0: ${t0.toFixed(1)} / 100
คะแนน T1: ${t1.toFixed(1)} / 100
พัฒนาการ: ${(t1-t0).toFixed(1)} คะแนน
Zone: ${z[0]} - ${z[1]}
Incubation Readiness Score: ${r.score.toFixed(1)} / 100
Digital Portfolio: ${pc.done}/8 มิติ (${pc.percent.toFixed(1)}%)

รายได้เฉลี่ยต่อเดือนก่อนโครงการ: ${s.baselineMonthlyRevenue||0}
รายได้เฉลี่ยต่อเดือนปัจจุบัน: ${s.currentMonthlyRevenue||0}
รายได้เพิ่มขึ้น: ${getStoreRevenueGrowth(s).toFixed(1)}%
Signature Menu: ${s.signatureMenuCount||0}
นวัตกรรม/เมนู/ผลิตภัณฑ์: ${s.innovationCount||0}
ช่องทางจำหน่าย/คู่ค้าใหม่: ${s.newChannelCount||0}

จุดแข็ง 3 อันดับ:
${strong.map((d,i)=>`${i+1}. ${d.name}: ${d.t1.toFixed(1)}%`).join("\n")}

จุดอ่อน/ต้องพัฒนา 3 อันดับ:
${weak.map((d,i)=>`${i+1}. ${d.name}: ${d.t1.toFixed(1)}% - ${recommend(d.id,d.t1)}`).join("\n")}

Red Flag:
${flags.length?flags.map((f,i)=>`${i+1}. ${f.type} (${f.severity}) - ${f.text}`).join("\n"):"ไม่พบ Red Flag สำคัญ"}

Portfolio 8 มิติ:
${dimensions.map(d=>`${d.id}. ${d.name}: ${data.portfolio?.[s.id]?.[d.id]?.complete?"สมบูรณ์":"ยังไม่สมบูรณ์"}`).join("\n")}`;
}
function reportPage(){
  const s=data.stores.find(x=>x.id===selectedStoreId)||data.stores[0]; if(!s)return `<div class="card">ยังไม่มีร้าน</div>`; selectedStoreId=s.id;
  const t0=totalScore(s.id,"T0"), t1=totalScore(s.id,"T1"), z=zone(t1), calc=readiness(s.id), flags=redFlags(s.id,"T1"), pc=portfolioCompletion(s.id);
  const dims=dimensions.map(d=>({...d,t0:dimScore(s.id,"T0",d.id),t1:dimScore(s.id,"T1",d.id)})); const weak=[...dims].sort((a,b)=>a.t1-b.t1).slice(0,3); const idp=data.idp[s.id]||{issue:"",action:"",responsible:"",dueDate:"",progress:""}; data.idp[s.id]=idp;
  return `${title("Restaurant Survival Report","รายงานวินิจฉัยร้าน + Portfolio + IDP")}
  <div class="row no-print">${storeAcHtml(s.id)}<button class="btn dark" onclick="download('${s.id}_survival_portfolio_report.txt',reportText('${s.id}'))">Export Report TXT</button><button class="btn" onclick="window.print()">Print / Save PDF</button></div><div class="space"></div>
  <div class="grid g2"><div class="card"><h3>${esc(s.name)}</h3><p><b>จังหวัด:</b> ${esc(s.province)} | <b>สถานะ:</b> ${esc(s.status)}</p><p><b>เจ้าของ:</b> ${esc(s.owner||"-")} | <b>โทร:</b> ${esc(s.phone||"-")}</p><p><b>ปัญหาหลัก:</b> ${esc(s.mainProblem||"-")}</p><p><b>เป้าหมาย:</b> ${esc(s.growthGoal||"-")}</p><div class="grid g4">${stat("T0",t0.toFixed(1),"")}${stat("T1",t1.toFixed(1),"")}${stat("Readiness",calc.score.toFixed(1),"")}${stat("Portfolio",pc.done+"/8",pc.percent.toFixed(1)+"%")}</div><div class="space"></div><span class="badge ${z[2]}">${z[0]} — ${z[1]}</span></div>
  <div class="card"><h3>ตัวชี้วัดธุรกิจ</h3>${stat("รายได้เพิ่มขึ้น",getStoreRevenueGrowth(s).toFixed(1)+"%","จากฐานก่อนโครงการ")}<p>Signature Menu: <b>${s.signatureMenuCount||0}</b> | Innovation: <b>${s.innovationCount||0}</b> | ช่องทางใหม่: <b>${s.newChannelCount||0}</b></p><p>Pitch Deck: ${s.hasPitchDeck?"✓":"-"} | Scaling Plan: ${s.hasScalingPlan?"✓":"-"} | SOP: ${s.hasSOP?"✓":"-"}</p></div></div><div class="space"></div>
  <div class="grid g3"><div class="card"><h3>จุดอ่อน 3 อันดับ</h3>${weak.map((d,i)=>`<div class="alert" style="background:#fefce8;color:#854d0e;border-color:#fde68a">${i+1}. ${esc(d.name)} — ${d.t1.toFixed(1)}%<br>${esc(recommend(d.id,d.t1))}</div>`).join("")}</div>
  <div class="card"><h3>Red Flag</h3>${flags.length?flags.map(f=>`<div class="alert">${f.type} (${f.severity})<br>${f.text}</div>`).join(""):`<div class="badge green">ไม่พบ Red Flag สำคัญ</div>`}</div>
  <div class="card"><h3>Portfolio 8 มิติ</h3>${dimensions.map(d=>`<div class="row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:7px 0"><span>${d.id}. ${esc(d.short)}</span><span class="badge ${data.portfolio?.[s.id]?.[d.id]?.complete?"green":"gray"}">${data.portfolio?.[s.id]?.[d.id]?.complete?"Complete":"Pending"}</span></div>`).join("")}</div></div><div class="space"></div>
  <div class="card"><h3>Individual Development Plan (IDP)</h3><div class="grid g2"><textarea placeholder="ประเด็นที่ต้องพัฒนา" onchange="data.idp['${s.id}'].issue=this.value;save()">${esc(idp.issue)}</textarea><textarea placeholder="แผนดำเนินการ" onchange="data.idp['${s.id}'].action=this.value;save()">${esc(idp.action)}</textarea><input placeholder="ผู้รับผิดชอบ" value="${esc(idp.responsible)}" onchange="data.idp['${s.id}'].responsible=this.value;save()"><input type="date" value="${esc(idp.dueDate)}" onchange="data.idp['${s.id}'].dueDate=this.value;save()"><textarea style="grid-column:1/-1" placeholder="ความคืบหน้า / หมายเหตุ Mentor" onchange="data.idp['${s.id}'].progress=this.value;save()">${esc(idp.progress)}</textarea></div></div>`;
}
function toolsPage(){
  return `${title("เครื่องมือข้อมูล","สำรองข้อมูล นำเข้าข้อมูล และ Export รายงานสำหรับ PMO")}
  <div class="grid g5"><button class="btn dark" onclick="exportJSON()">Backup JSON</button><label class="btn">Import JSON<input type="file" accept="application/json" style="display:none" onchange="importJSON(this.files[0])"></label><button class="btn" onclick="exportScores()">Export Scores</button><button class="btn" onclick="exportPortfolio()">Export Portfolio</button><button class="btn" onclick="exportOKR()">Export OKR</button></div>
  <div class="space"></div><button class="btn bad" onclick="resetAll()">Reset ข้อมูลตัวอย่าง</button>
  <div class="space"></div><div class="card"><h3>Workflow ใช้งานจริง</h3><ol><li>เพิ่มร้านในหน้า “ร้าน”</li><li>ประเมิน T0/T1 ในหน้า “ประเมิน”</li><li>กรอก Portfolio 8 มิติในหน้า “Portfolio”</li><li>กรอกตัวชี้วัดรายร้าน เช่น รายได้ เมนูใหม่ นวัตกรรม ช่องทางขาย ในหน้า “ตัวชี้วัดร้าน”</li><li>กรอก Pitching</li><li>กดคำนวณ OKR จากข้อมูลระบบในหน้า “OKR”</li><li>ดู Ranking และ Export รายงาน</li></ol></div>`;
}
function renderNav(){
  const items=[["dashboard","Dashboard"],["stores","ร้าน"],["metrics","ตัวชี้วัดร้าน"],["assessment","ประเมิน"],["portfolio","Portfolio"],["pitching","Pitching"],["ranking","Ranking"],["okr","OKR"],["report","รายงาน"],["tools","ข้อมูล"]];
  document.getElementById("nav").innerHTML=items.map(([k,l])=>`<button class="${view===k?"active":""}" onclick="go('${k}')">${l}</button>`).join("");
  document.getElementById("mobileNav").innerHTML=items.map(([k,l])=>`<button class="btn ${view===k?"dark":""}" onclick="go('${k}')">${l}</button>`).join("");
}
function render(){
  renderNav();
  const pages={dashboard,stores:storesPage,metrics:storeMetricsPage,assessment,pitching:pitchingPage,ranking:rankingPage,report:reportPage,tools:toolsPage,portfolio:portfolioPage,okr:okrPage};
  document.getElementById("main").innerHTML=pages[view]();
}
render();
</script>
</body>
